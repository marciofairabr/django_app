version: "3.9"

services:

  traefik:
    image: traefik:v3
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=admin@empresa.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
      - ./letsencrypt:/letsencrypt
    restart: always

  django:
    build: .
    container_name: django_app
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - redis

    expose:
      - "8000"

    command: gunicorn django_app.wsgi:application --bind 0.0.0.0:8000 --workers 4

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`app.local`)"
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls.certresolver=le"
      - "traefik.http.services.django.loadbalancer.server.port=8000"

  celery:
    build: .
    container_name: celery_worker
    restart: always
    env_file: .env
    command: celery -A django_app worker -l info
    depends_on:
      - redis
      - postgres

  celery-beat:
    build: .
    container_name: celery_beat
    restart: always
    env_file: .env
    command: celery -A django_app beat -l info
    depends_on:
      - redis

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: